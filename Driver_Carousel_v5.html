<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<style>
html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
* { box-sizing: border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f3; }
.scene { width: 100vw; height: 100vh; display: flex; flex-direction: column; background: #f5f5f3; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 28px; background: #fff; border-bottom: 1px solid #e8e8e8; flex-shrink: 0; }
.driver-mark { font-size: 18px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #1a3a6b; }
.losch-mark { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #1a3a6b; opacity: 0.6; }
.stage-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 0; }
.hint { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #aaa; margin-bottom: 20px; }
.stage { position: relative; width: 100%; height: 260px; display: flex; align-items: center; justify-content: center; }
.arrow { position: absolute; top: 50%; transform: translateY(-50%); color: #1a3a6b; cursor: pointer; user-select: none; z-index: 20; width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.15s, opacity 0.15s; opacity: 0.45; }
.arrow:hover { background: rgba(26,58,107,0.08); opacity: 1; }
.arrow.left { left: 16px; }
.arrow.right { right: 16px; }
.cards { position: relative; width: 100%; height: 100%; }
.card { position: absolute; left: 50%; top: 50%; border-radius: 20px; background: #fff; border: 1px solid rgba(0,0,0,0.07); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1), opacity 0.55s ease, filter 0.55s ease, box-shadow 0.25s ease; }
.card.front:hover { box-shadow: 0 16px 48px rgba(26,58,107,0.13); }
.card-inner { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; padding: 24px; }
.card-inner img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
.dots { display: flex; justify-content: center; gap: 8px; margin-top: 20px; flex-wrap: wrap; max-width: 220px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; transition: background 0.3s, transform 0.3s; cursor: pointer; }
.dot.active { background: #1a3a6b; transform: scale(1.4); }
.brand-name { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: #999; margin-top: 16px; }
</style>
</head>
<body>
<div class='scene'>
  <div class='topbar'>
    <div class='driver-mark'>Driver</div>
    <div class='losch-mark'>Losch Luxembourg</div>
  </div>
  <div class='stage-wrap'>
    <div class='hint'>Select a brand</div>
    <div class='stage'>
      <div class='arrow left' onclick='rotate(-1)'>
        <svg width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='15 18 9 12 15 6'></polyline></svg>
      </div>
      <div class='cards' id='cards'></div>
      <div class='arrow right' onclick='rotate(1)'>
        <svg width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='9 18 15 12 9 6'></polyline></svg>
      </div>
    </div>
    <div class='dots' id='dots'></div>
    <div class='brand-name' id='brandName'>Porsche</div>
  </div>
</div>
<script>
const BASE = 'https://fsmc7qcfgp-web.github.io/driver-carousel/';
const brands = [
  { name: 'Porsche',          src: BASE + 'Porsche.png' },
  { name: 'Volkswagen',       src: BASE + 'Volkswagen.png' },
  { name: 'Audi',             src: BASE + 'Audi.png' },
  { name: 'Skoda',            src: BASE + 'Skoda.png' },
  { name: 'SEAT',             src: BASE + 'SEAT.png' },
  { name: 'Cupra',            src: BASE + 'Cupra.png' },
  { name: 'Lamborghini',      src: BASE + 'Lamborghini.png' },
  { name: 'Bentley',          src: BASE + 'Bentley.png' },
  { name: 'VW Nutzfahrzeuge', src: BASE + 'VW_Nutzfahrzeuge.png' },
];
let current = 0, animating = false;
function mod(n,m){ return ((n%m)+m)%m; }
function render() {
  const track = document.getElementById('cards');
  const dotsEl = document.getElementById('dots');
  const nameEl = document.getElementById('brandName');
  const n = brands.length;
  track.innerHTML = '';
  dotsEl.innerHTML = '';
  nameEl.textContent = brands[current].name;
  for (let i = 0; i < n; i++) {
    const offset = mod(i - current, n);
    const pos = offset <= n/2 ? offset : offset - n;
    const absp = Math.abs(pos);
    if (absp > 2) continue;
    const b = brands[i];
    const isFront = pos === 0;
    const scale   = isFront ? 1    : (absp === 1 ? 0.65 : 0.45);
    const xOff    = pos * 175;
    const zIndex  = isFront ? 5    : (absp === 1 ? 3 : 1);
    const opacity = isFront ? 1    : (absp === 1 ? 0.40 : 0.18);
    const blur    = isFront ? 0    : (absp === 1 ? 2 : 5);
    const size    = isFront ? 200  : (absp === 1 ? 150 : 110);
    const shadow  = isFront ? '0 8px 28px rgba(0,0,0,0.10)' : 'none';
    const card = document.createElement('div');
    card.className = 'card' + (isFront ? ' front' : '');
    card.style.cssText = `width:${size}px;height:${size}px;transform:translate(calc(-50% + ${xOff}px),-50%) scale(${scale});z-index:${zIndex};opacity:${opacity};filter:blur(${blur}px);box-shadow:${shadow};`;
    if (isFront) card.onclick = () => selectBrand(b.name);
    const inner = document.createElement('div');
    inner.className = 'card-inner';
    const img = document.createElement('img');
    img.src = b.src;
    img.alt = b.name;
    inner.appendChild(img);
    card.appendChild(inner);
    track.appendChild(card);
  }
  for (let i = 0; i < n; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === current ? ' active' : '');
    dot.onclick = () => goTo(i);
    dotsEl.appendChild(dot);
  }
}
function rotate(dir) {
  if (animating) return;
  animating = true;
  current = mod(current + dir, brands.length);
  render();
  setTimeout(() => { animating = false; }, 570);
}
function goTo(idx) {
  if (animating || idx === current) return;
  animating = true;
  current = idx;
  render();
  setTimeout(() => { animating = false; }, 570);
}
function selectBrand(name) {
  alert('Opening: ' + name);
}
render();
</script>
</body>
</html>
